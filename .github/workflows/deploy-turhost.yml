name: Deploy Turhost

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Turhost (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.TURHOST_FTP_SERVER }}
          username: ${{ secrets.TURHOST_FTP_USERNAME }}
          password: ${{ secrets.TURHOST_FTP_PASSWORD }}
          port: 21
          local-dir: dist/
          server-dir: ${{ secrets.TURHOST_SERVER_DIR }}
